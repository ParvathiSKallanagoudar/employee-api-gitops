apiVersion: v1
kind: Service

metadata:
  name: employee-api-service

  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/actuator/prometheus"
    prometheus.io/port: "8080"

spec:
  type: NodePort

  selector:
    app: employee-api

  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30080
